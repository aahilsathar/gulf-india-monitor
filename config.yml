# Gulf-India Monitor — configuration
# Edit this file, then restart the service (or POST /api/refresh).

refresh_minutes:
  tape: 5
  news: 15

# Price tape. Yahoo Finance symbols (free, ~15min delayed on futures).
tape:
  - { symbol: "BZ=F",     name: "BRENT",    unit: "$/bbl" }
  - { symbol: "CL=F",     name: "WTI",      unit: "$/bbl" }
  - { symbol: "NG=F",     name: "HH GAS",   unit: "$/mmbtu" }
  - { symbol: "INR=X",    name: "USD/INR",  unit: "" }
  - { symbol: "DX-Y.NYB", name: "DXY",      unit: "" }
  - { symbol: "^NSEI",    name: "NIFTY 50", unit: "" }
  - { symbol: "^TNX",     name: "US 10Y",   unit: "%", divide: 1 }
  - { symbol: "GC=F",     name: "GOLD",     unit: "$/oz" }

# GDELT full-text query for the corridor (free, no key).
gdelt_query: '(India OR Hormuz OR OPEC OR "Red Sea" OR Gulf OR UAE OR Saudi) (crude OR oil OR LNG OR refinery OR tanker OR sanctions OR freight)'

# Extra RSS feeds (free). Add or remove as you like.
rss_feeds:
  - https://oilprice.com/rss/main
  - https://news.google.com/rss/search?q=india+crude+imports&hl=en-IN&gl=IN&ceid=IN:en
  - https://news.google.com/rss/search?q=strait+of+hormuz+OR+red+sea+shipping&hl=en&gl=US&ceid=US:en

# Rule-based priority tagging (transparent, no AI guessing).
priority_rules:
  critical: [hormuz, "red sea", attack, strike, missile, seiz, sanction, embargo, blockade]
  important: [opec, outage, shutdown, maintenance, freight, tanker, refinery, export ban, windfall]

# Upcoming catalysts — maintain by hand; shown verbatim on the dashboard.
catalysts:
  - { when: "Check monthly", what: "OPEC+ meeting", watch: "Quota decisions vs. compliance" }
  - { when: "Wed (US)",      what: "EIA weekly inventories", watch: "Crude + product draws" }
  - { when: "Aug (RBI cal)", what: "RBI MPC decision", watch: "INR path, rate guidance" }
  - { when: "Oct 2026",      what: "India CCTS compliance market opens", watch: "First CCC price prints" }

# Keyword -> market impact chips shown on critical/important signals.
impact_map:
  hormuz: ["Freight & war-risk ↑", "Brent risk premium ↑", "India import bill ↑"]
  blockade: ["Supply risk ↑", "Tanker availability ↓"]
  "red sea": ["Suez reroute → freight ↑", "Asia–Europe delays"]
  sanction: ["Russian crude discounts widen", "Compliance risk on flows"]
  tanker: ["Freight rates reprice", "Insurance costs ↑"]
  refinery: ["Product cracks move", "Regional supply shifts"]
  opec: ["Supply quotas → flat price", "Watch compliance vs talk"]
  lng: ["Spot LNG reprices", "Gas-linked power costs ↑"]
  "export tax": ["Refiner margins captured by govt"]
  freight: ["Arb windows open/close", "Shipping equities move"]

# Plain-English glossary shown in Learn mode.
glossary:
  - { term: "Risk premium", plain: "Extra price paid for the chance supply gets disrupted — not for barrels actually lost yet." }
  - { term: "Brent–WTI spread", plain: "Global oil price minus US oil price. Widens when US crude is trapped or the world is short." }
  - { term: "Crack spread", plain: "A refiner's margin: product price minus crude cost. India's refiners live and die by this." }
  - { term: "War-risk insurance", plain: "Premium to insure a ship through a conflict zone. In a crisis it can exceed the freight itself." }
  - { term: "Contango", plain: "Future prices above today's — the market paying traders to store oil now and sell it later." }
  - { term: "DXY", plain: "The dollar index. A stronger dollar usually pressures oil and EM currencies like INR." }
